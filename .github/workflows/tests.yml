name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - "issue-*"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest
